# Deploys the self-contained prototype to GitHub Pages on every push to main,
# so the Home-Screen app at https://ebleach2010.github.io/Pocket-Advocate/
# always shows the latest reviewed state. (The real app deploys to Cloudflare
# separately — this is the zero-backend review build.)
name: Deploy prototype to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir _site
          cp PROTOTYPE.html _site/index.html
          cp icon-180.png manifest.webmanifest _site/
          cp FLOW.html _site/flow.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
      - id: deployment
        uses: actions/deploy-pages@v4
