# Publishes the self-contained prototype to the gh-pages branch on every push
# to main, so the Home-Screen app at
# https://ebleach2010.github.io/Pocket-Advocate/ always shows the latest
# reviewed state. (The real app deploys to Cloudflare separately — this is the
# zero-backend review build.)
name: Deploy prototype to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir _site
          cp PROTOTYPE.html _site/index.html
          cp icon-180.png manifest.webmanifest _site/
          cp FLOW.html _site/flow.html
          touch _site/.nojekyll
      - name: Push to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
