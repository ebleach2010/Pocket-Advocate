<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pocket Advocate">
<meta name="theme-color" content="#07090F">
<title>Payment complete — Pocket Advocate</title>
<link rel="stylesheet" href="/css/site.css?v=stat5">
</head>
<body>
<header class="bar">
  <div class="bar-inner">
    <a class="brand" href="/">Pocket<span class="spark">Advocate</span></a>
    <nav class="tabs">
      <a href="/">Book</a>
      <a href="/about.html">About</a>
      <a href="/reviews.html">Reviews</a>
      <span data-nav-auth></span>
    </nav>
  </div>
</header>
<main>
  <h1 id="title">Finishing up…</h1>
  <p class="muted" id="msg">Payment received — opening your case now. This usually takes a few seconds.</p>
  <p id="actions" hidden><a class="btn" id="case-link" href="/case.html">Go to my case</a></p>
</main>
<script type="module">
  import { requireUser, hydrateNav } from '/js/auth.js';

  hydrateNav();
  const user = await requireUser();
  const sessionId = new URLSearchParams(location.search).get('session_id');
  const title = document.getElementById('title');
  const msg = document.getElementById('msg');

  if (user && sessionId) {
    // The case is created by the Stripe webhook, never by this browser —
    // so we poll until it lands (normally 1–5 seconds).
    const started = Date.now();
    const poll = async () => {
      try {
        const idToken = await user.getIdToken();
        const res = await fetch(`/api/case-for-session?session_id=${encodeURIComponent(sessionId)}`, {
          headers: { authorization: `Bearer ${idToken}` },
        });
        const data = await res.json();
        if (data.ready) {
          title.textContent = 'Your case is open';
          msg.textContent = 'Your appointment is booked and your case file is ready. You can upload labs and imaging any time before the call.';
          document.getElementById('case-link').href = `/case.html?id=${data.caseId}`;
          document.getElementById('actions').hidden = false;
          return;
        }
      } catch { /* transient — keep polling */ }
      if (Date.now() - started < 90_000) {
        setTimeout(poll, 2500);
      } else {
        title.textContent = 'Almost there';
        msg.textContent = 'Your payment went through, but your case is taking longer than usual to open. Check "My cases" in a minute — it will be there.';
        document.getElementById('actions').hidden = false;
      }
    };
    poll();
  } else if (!sessionId) {
    title.textContent = 'Nothing to finish';
    msg.textContent = 'No checkout session found.';
  }
</script>
</body>
</html>
