<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pocket Advocate">
<meta name="theme-color" content="#07090F">
<!-- Chat is deliberately dark — its own focused space, separate from the rest. -->
<title>Chat — Pocket Advocate</title>
<link rel="stylesheet" href="/css/site.css?v=stat9">
<script>(function(){try{var t=localStorage.getItem('pa-theme')||'earth';document.documentElement.setAttribute('data-theme',t);var m={earth:'/css/theme-earth.css?v=e8',dark:'/css/theme-dark.css?v=d1',contrast:'/css/theme-contrast.css?v=c1'};if(m[t])document.write('<link rel="stylesheet" href="'+m[t]+'" data-theme-css="1">');}catch(e){}})();</script>
<script>(function(){window.addEventListener("pageshow",function(e){if(e.persisted)location.reload();});setTimeout(function(){try{var b=document.body;if(!b)return;if(/Loading…|Loading\.\.\.|Loading messages|Finishing up/.test(b.textContent)&&!document.getElementById("pa-stuck")){var d=document.createElement("div");d.id="pa-stuck";d.style.cssText="position:fixed;left:0;right:0;bottom:0;padding:14px;text-align:center;background:#1b1b1b;color:#fff;font:600 15px system-ui;z-index:9999";d.innerHTML='Trouble connecting. <a href="#" style="color:#7fd8ff" onclick="location.reload();return false">Tap to reload</a>';b.appendChild(d);}}catch(e){}},9000);})();</script>
</head>
<body class="chat-page">
<header class="bar">
  <div class="bar-inner">
    <a class="brand" href="/">Pocket<span class="spark">Advocate</span></a>
    <nav class="tabs">
      <a href="/">Book</a>
      <a href="/about.html">About</a>
      <a href="/reviews.html">Reviews</a>
      <span data-nav-auth></span>
    </nav>
  </div>
</header>
<main>
  <div class="row">
    <h1 style="margin:0;">Chat with Eric</h1>
    <span><span class="p-dot"></span><span class="p-label">Checking…</span></span>
  </div>
  <div id="switcher" class="case-picker" hidden></div>
  <div id="chat" class="panel" style="margin-top:.8rem;"><p class="dim small">Loading…</p></div>
</main>
<script type="module" src="/js/chat-page.js"></script>
</body>
</html>
