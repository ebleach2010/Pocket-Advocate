<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pocket Advocate">
<meta name="theme-color" content="#EBDFCE">
<title>Availability — Pocket Advocate admin</title>
<link rel="stylesheet" href="/css/site.css?v=stat9">
<script>(function(){try{var t=localStorage.getItem('pa-theme')||'earth';document.documentElement.setAttribute('data-theme',t);var m={earth:'/css/theme-earth.css?v=e8',dark:'/css/theme-dark.css?v=d1',contrast:'/css/theme-contrast.css?v=c1'};if(m[t])document.write('<link rel="stylesheet" href="'+m[t]+'" data-theme-css="1">');}catch(e){}})();</script>
<script>(function(){window.addEventListener("pageshow",function(e){if(e.persisted)location.reload();});setTimeout(function(){try{var b=document.body;if(!b)return;if(/Loading…|Loading\.\.\.|Loading messages|Finishing up/.test(b.textContent)&&!document.getElementById("pa-stuck")){var d=document.createElement("div");d.id="pa-stuck";d.style.cssText="position:fixed;left:0;right:0;bottom:0;padding:14px;text-align:center;background:#1b1b1b;color:#fff;font:600 15px system-ui;z-index:9999";d.innerHTML='Trouble connecting. <a href="#" style="color:#7fd8ff" onclick="location.reload();return false">Tap to reload</a>';b.appendChild(d);}}catch(e){}},9000);})();</script>
</head>
<body>
<header class="bar">
  <div class="bar-inner">
    <a class="brand" href="/">Pocket<span class="spark">Advocate</span></a>
    <nav class="tabs">
      <a href="/admin.html">Clients</a>
      <a href="/admin-calendar.html">Calendar</a>
      <a href="/admin-chats.html">Chats</a>
      <a href="/admin-availability.html" class="active">Availability</a>
      <span data-nav-auth></span>
    </nav>
  </div>
</header>
<main>
  <h1>Availability</h1>
  <p class="dim small">All times MST — fixed UTC-7, year-round, 8am–6pm. Clients can only book slots you open here, 72+ hours out.</p>

  <div class="panel">
    <h3>Open new slots</h3>
    <label>From <input type="date" id="from"></label>
    <label style="margin-top:.5rem;">Through <input type="date" id="to"></label>
    <label style="margin-top:.5rem;">Start times (MST, 60-minute sessions)</label>
    <div id="hours"></div>
    <label class="inline" style="margin-top:.5rem;"><input type="checkbox" id="weekdays" checked> Weekdays only</label>
    <p class="error" id="create-error" hidden></p>
    <p class="ok" id="create-ok" hidden></p>
    <div class="actions"><button class="btn" id="create">Open these slots</button></div>
  </div>

  <h2 style="margin-top:1.5rem;">The calendar</h2>
  <div id="calendar"><p class="dim">Loading…</p></div>
</main>
<script type="module" src="/js/admin-availability.js"></script>
</body>
</html>
